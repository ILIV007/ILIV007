<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 160" width="860">
  <defs>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    text { font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace; font-size: 12px; }
    .title { fill: #00f0ff; font-weight: bold; font-size: 14px; filter: url(#glow); }
    .key { fill: #00f0ff; font-weight: bold; }
    .val { fill: #c9d1d9; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .anim { animation: fadeSlide 0.4s ease-out forwards; opacity: 0; }
  </style>
  <rect width="100%" height="100%" fill="#0a0e14" rx="8" stroke="#21262d" stroke-width="1"/>
  <text x="28" y="22" class="title">MISSION BRIEFING</text>
  <line x1="28" y1="30" x2="832" y2="30" stroke="#21262d" stroke-width="1"/>
  <g class="anim" style="animation-delay: 0.30s;">
    <text x="28" y="32" class="key" style="fill:#00f0ff">Motto</text>
    <text x="168" y="32" class="val">Building autonomous AI systems at the edge.</text>
  </g>
  <g class="anim" style="animation-delay: 0.45s;">
    <text x="28" y="56" class="key" style="fill:#39d353">Mission</text>
    <text x="168" y="56" class="val">Making AI tools open, accessible, and lightning-fast.</text>
  </g>
  <g class="anim" style="animation-delay: 0.60s;">
    <text x="28" y="80" class="key" style="fill:#ff00a0">Current Objective</text>
    <text x="168" y="80" class="val">Fredy v8 — AI Agent Orchestrator with multi-model routing.</text>
  </g>
  <g class="anim" style="animation-delay: 0.75s;">
    <text x="28" y="104" class="key" style="fill:#e3b341">Philosophy</text>
    <text x="168" y="104" class="val">Ship fast. Iterate faster. Open source everything.</text>
  </g>
</svg>