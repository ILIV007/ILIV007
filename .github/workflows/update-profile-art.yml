name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: Render knight portrait
        run: python scripts/make_knight_svg.py knight-portrait.png knight.svg ${{ github.repository_owner }}
      - name: Render info card
        run: python scripts/make_info_card.py info-card.svg ${{ github.repository_owner }}
      - name: Fetch & render activity feed
        run: python scripts/make_activity_feed.py activity-feed.svg
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile art [skip ci]"
          file_pattern: "knight.svg info-card.svg activity-feed.svg"
