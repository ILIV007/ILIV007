name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        run: python scripts/fetch_contributions.py
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}

      - name: Render contribution heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Render info card
        run: python scripts/make_info_card.py

      - name: Prep knight source & render emblem
        run: |
          python scripts/prep_photo.py knight-angled.png || true
          python scripts/make_knight_svg.py data/prepped.png iliv-knight.svg || true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile art [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg info-card.svg iliv-knight.svg"
