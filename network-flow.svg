<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860">
  <defs>
    <filter id="nodeGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="packetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace; font-size: 10px; text-anchor: middle; }
    .node-box { rx: 6; stroke-width: 1.5; filter: url(#nodeGlow); }
    .node-label { fill: #c9d1d9; font-weight: bold; }
    .node-icon { font-size: 16px; }
    .conn { stroke-width: 1.5; stroke-dasharray: 3,3; opacity: 0.35; }
    .packet { rx: 2.5; fill: url(#packetGrad); }
    .section-title { fill: #00f0ff; font-weight: bold; font-size: 12px; filter: url(#nodeGlow); }
  </style>
  <rect width="100%" height="100%" fill="#0a0e14" rx="8" stroke="#21262d" stroke-width="1"/>
  <text x="430" y="20" text-anchor="middle" class="section-title">NETWORK ARCHITECTURE</text>
  <line x1="24" y1="28" x2="836" y2="28" stroke="#21262d" stroke-width="1"/>
  <line x1="60" y1="70" x2="60" y2="110" stroke="#00f0ff" class="conn">
    <animate attributeName="stroke-dashoffset" from="6" to="0" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="60" y1="150" x2="60" y2="190" stroke="#39d353" class="conn">
    <animate attributeName="stroke-dashoffset" from="6" to="0" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="210" x2="220" y2="170" stroke="#a371f7" class="conn">
    <animate attributeName="stroke-dashoffset" from="6" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="210" x2="300" y2="170" stroke="#58a6ff" class="conn">
    <animate attributeName="stroke-dashoffset" from="6" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="210" x2="380" y2="170" stroke="#39d353" class="conn">
    <animate attributeName="stroke-dashoffset" from="6" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="210" x2="460" y2="170" stroke="#f0883e" class="conn">
    <animate attributeName="stroke-dashoffset" from="6" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="210" x2="540" y2="170" stroke="#e3b341" class="conn">
    <animate attributeName="stroke-dashoffset" from="6" to="0" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="240" y1="185" x2="400" y2="235" stroke="#a371f7" class="conn" opacity="0.2"/>
  <line x1="320" y1="185" x2="480" y2="235" stroke="#58a6ff" class="conn" opacity="0.2"/>
  <line x1="400" y1="185" x2="560" y2="235" stroke="#39d353" class="conn" opacity="0.2"/>
  <line x1="480" y1="185" x2="400" y2="235" stroke="#f0883e" class="conn" opacity="0.2"/>
  <line x1="560" y1="185" x2="480" y2="235" stroke="#e3b341" class="conn" opacity="0.2"/>
  <line x1="400" y1="265" x2="400" y2="295" stroke="#00f0ff" class="conn" opacity="0.25"/>
  <line x1="480" y1="265" x2="400" y2="295" stroke="#39d353" class="conn" opacity="0.25"/>
  <line x1="560" y1="265" x2="400" y2="295" stroke="#ff00a0" class="conn" opacity="0.25"/>
  <rect class="packet" x="56" y="70" width="8" height="4" rx="2">
    <animate attributeName="y" from="70" to="110" dur="1.5s" repeatCount="indefinite"
             begin="0.0s"/>
  </rect>
  <rect class="packet" x="56" y="150" width="8" height="4" rx="2">
    <animate attributeName="y" from="150" to="190" dur="1.5s" repeatCount="indefinite"
             begin="0.5s"/>
  </rect>
  <rect class="packet" x="100" y="208" width="6" height="4" rx="2" fill="#a371f7">
    <animate attributeName="x" from="100" to="220" dur="1s" repeatCount="indefinite"
             begin="0.0s"/>
    <animate attributeName="y" from="210" to="170" dur="1s" repeatCount="indefinite"
             begin="0.0s"/>
  </rect>
  <rect class="packet" x="100" y="208" width="6" height="4" rx="2" fill="#58a6ff">
    <animate attributeName="x" from="100" to="300" dur="1s" repeatCount="indefinite"
             begin="0.3s"/>
    <animate attributeName="y" from="210" to="170" dur="1s" repeatCount="indefinite"
             begin="0.3s"/>
  </rect>
  <rect class="packet" x="100" y="208" width="6" height="4" rx="2" fill="#39d353">
    <animate attributeName="x" from="100" to="380" dur="1s" repeatCount="indefinite"
             begin="0.6s"/>
    <animate attributeName="y" from="210" to="170" dur="1s" repeatCount="indefinite"
             begin="0.6s"/>
  </rect>
  <rect class="packet" x="100" y="208" width="6" height="4" rx="2" fill="#f0883e">
    <animate attributeName="x" from="100" to="460" dur="1s" repeatCount="indefinite"
             begin="0.8999999999999999s"/>
    <animate attributeName="y" from="210" to="170" dur="1s" repeatCount="indefinite"
             begin="0.8999999999999999s"/>
  </rect>
  <rect class="packet" x="100" y="208" width="6" height="4" rx="2" fill="#e3b341">
    <animate attributeName="x" from="100" to="540" dur="1s" repeatCount="indefinite"
             begin="1.2s"/>
    <animate attributeName="y" from="210" to="170" dur="1s" repeatCount="indefinite"
             begin="1.2s"/>
  </rect>
  <rect class="node-box" x="25" y="32" width="70" height="36"
        fill="#0a0e14" stroke="#00f0ff"/>
  <text x="60" y="54" class="node-label" style="fill:#00f0ff; font-size:10px">Browser</text>
  <rect class="node-box" x="25" y="112" width="70" height="36"
        fill="#0a0e14" stroke="#39d353"/>
  <text x="60" y="134" class="node-label" style="fill:#39d353; font-size:10px">Cloudflare
Worker</text>
  <rect class="node-box" x="25" y="192" width="70" height="36"
        fill="#0a0e14" stroke="#ff00a0"/>
  <text x="60" y="214" class="node-label" style="fill:#ff00a0; font-size:10px">AI Router</text>
  <rect class="node-box" x="215" y="156" width="50" height="28"
        fill="#0a0e14" stroke="#a371f7"/>
  <text x="240" y="174" class="node-label" style="fill:#a371f7; font-size:9px">Claude</text>
  <rect class="node-box" x="295" y="156" width="50" height="28"
        fill="#0a0e14" stroke="#58a6ff"/>
  <text x="320" y="174" class="node-label" style="fill:#58a6ff; font-size:9px">Gemini</text>
  <rect class="node-box" x="375" y="156" width="50" height="28"
        fill="#0a0e14" stroke="#39d353"/>
  <text x="400" y="174" class="node-label" style="fill:#39d353; font-size:9px">GPT</text>
  <rect class="node-box" x="455" y="156" width="50" height="28"
        fill="#0a0e14" stroke="#f0883e"/>
  <text x="480" y="174" class="node-label" style="fill:#f0883e; font-size:9px">DeepSeek</text>
  <rect class="node-box" x="535" y="156" width="50" height="28"
        fill="#0a0e14" stroke="#e3b341"/>
  <text x="560" y="174" class="node-label" style="fill:#e3b341; font-size:9px">Qwen</text>
  <rect class="node-box" x="375" y="236" width="50" height="28"
        fill="#0a0e14" stroke="#00f0ff"/>
  <text x="400" y="254" class="node-label" style="fill:#00f0ff; font-size:9px">Fredy</text>
  <rect class="node-box" x="455" y="236" width="50" height="28"
        fill="#0a0e14" stroke="#39d353"/>
  <text x="480" y="254" class="node-label" style="fill:#39d353; font-size:9px">Hermes</text>
  <rect class="node-box" x="535" y="236" width="50" height="28"
        fill="#0a0e14" stroke="#ff00a0"/>
  <text x="560" y="254" class="node-label" style="fill:#ff00a0; font-size:9px">Pixoris</text>
  <rect class="node-box" x="365" y="292" width="70" height="36"
        fill="#0a0e14" stroke="#f0883e"/>
  <text x="400" y="314" class="node-label" style="fill:#f0883e; font-size:10px">Telegram</text>
</svg>